<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>YouSong</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#08080f;--bg2:#0f0f1a;--bg3:#1a1a2e;--acc:#7c4dff;--acc2:#e040fb;--w:#fff;--w2:rgba(255,255,255,.55);--w3:rgba(255,255,255,.2);}
html,body{height:100%;background:var(--bg);color:var(--w);font-family:'DM Sans',sans-serif;overflow:hidden;user-select:none;}
::-webkit-scrollbar{width:0;height:0;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#main{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:150px;}

/* SC HIDDEN PLAYER */
#sc-wrap{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;}
#sc-iframe{width:1px;height:1px;border:none;}

/* TOPBAR */
.topbar{padding:calc(16px + env(safe-area-inset-top)) 18px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:linear-gradient(var(--bg) 60%,transparent);}
.logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* SEARCH */
.srch-wrap{padding:2px 16px 12px;}
.srch-box{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:16px;padding:12px 16px;border:1.5px solid transparent;transition:.2s;}
.srch-box:focus-within{border-color:var(--acc);}
.srch-ico{width:17px;height:17px;stroke:var(--w3);fill:none;flex-shrink:0;}
.srch-box input{flex:1;background:none;border:none;outline:none;color:var(--w);font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;}
.srch-box input::placeholder{color:var(--w3);}
.srch-clr{background:none;border:none;color:var(--w3);font-size:15px;cursor:pointer;display:none;padding:0 2px;}
.srch-clr.v{display:block;}

/* SECTION */
.sec{padding:4px 16px 0;}
.sec-t{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:12px;}

/* GENRE */
.genre-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 2px;}
.gpill{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;border:none;color:#fff;cursor:pointer;transition:.15s;}
.gpill:active{transform:scale(.93);}

/* HSCROLL */
.hscroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px 4px;-webkit-overflow-scrolling:touch;}
.acard{flex-shrink:0;width:130px;cursor:pointer;}
.acard:active{opacity:.8;}
.acard-img{width:130px;height:130px;border-radius:13px;object-fit:cover;display:block;background:var(--bg3);}
.acard-img-ph{width:130px;height:130px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:40px;}
.acard-title{font-size:13px;font-weight:600;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acard-sub{font-size:11px;color:var(--w2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* SONG ROW */
.slist{display:flex;flex-direction:column;gap:3px;}
.srow{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:13px;cursor:pointer;transition:.12s;position:relative;overflow:hidden;}
.srow:active{background:var(--bg3);}
.srow.cur{background:linear-gradient(135deg,rgba(124,77,255,.15),rgba(224,64,251,.07));}
.srow.cur::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:linear-gradient(var(--acc),var(--acc2));border-radius:0 3px 3px 0;}
.sthumb{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.sthumb-ph{width:48px;height:48px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;}
.sinfo{flex:1;min-width:0;}
.stitle{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sartist{font-size:12px;color:var(--w2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sdur{font-size:11px;color:var(--w3);flex-shrink:0;}
.sbars{display:none;align-items:flex-end;gap:2px;height:14px;flex-shrink:0;}
.sbars.on{display:flex;}
.sbars span{width:3px;border-radius:2px;background:linear-gradient(var(--acc),var(--acc2));animation:sbr 1s ease-in-out infinite;}
.sbars span:nth-child(1){height:5px;animation-delay:0s;}
.sbars span:nth-child(2){height:13px;animation-delay:.17s;}
.sbars span:nth-child(3){height:7px;animation-delay:.34s;}
.sbars span:nth-child(4){height:10px;animation-delay:.08s;}
@keyframes sbr{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.3);}}

/* LOADER / EMPTY */
.loader{display:flex;justify-content:center;gap:6px;padding:40px 0;}
.loader span{width:8px;height:8px;border-radius:50%;animation:ldot .8s ease-in-out infinite;}
.loader span:nth-child(1){background:var(--acc);animation-delay:0s;}
.loader span:nth-child(2){background:var(--acc2);animation-delay:.16s;}
.loader span:nth-child(3){background:var(--acc);animation-delay:.32s;}
@keyframes ldot{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.empty{text-align:center;padding:50px 20px;color:var(--w2);font-size:14px;line-height:1.7;}
.empty .ei{display:block;font-size:40px;margin-bottom:10px;}

/* PAGES */
.page{display:none;}.page.on{display:block;}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(8,8,15,.93);backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.07);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:none;cursor:pointer;}
.ni svg{width:22px;height:22px;stroke:var(--w3);fill:none;stroke-width:1.8;transition:.2s;}
.ni span{font-size:10px;color:var(--w3);font-weight:600;transition:.2s;}
.ni.on svg{stroke:var(--acc);}
.ni.on span{color:var(--acc);}

/* MINI PLAYER */
#mini-p{position:fixed;bottom:calc(58px + env(safe-area-inset-bottom));left:10px;right:10px;z-index:190;transform:translateY(200%);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
#mini-p.show{transform:translateY(0);}
.mp-in{background:linear-gradient(135deg,rgba(124,77,255,.94),rgba(224,64,251,.9));backdrop-filter:blur(20px);border-radius:18px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 6px 28px rgba(124,77,255,.38);}
.mp-art{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.mp-art-ph{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.mp-title{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mp-artist{font-size:11px;color:rgba(255,255,255,.65);}
.mp-btns{display:flex;align-items:center;gap:6px;}
.mpb{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.mpb svg{width:15px;height:15px;fill:white;}
.mpb.big{width:40px;height:40px;background:#fff;}
.mpb.big svg{fill:var(--acc);width:16px;height:16px;}

/* FULL PLAYER */
#full-p{position:fixed;inset:0;z-index:500;background:var(--bg);transform:translateY(100%);transition:transform .4s cubic-bezier(.25,.46,.45,.94);}
#full-p.open{transform:translateY(0);}
.fp-bg{position:absolute;inset:0;opacity:.22;filter:blur(80px);pointer-events:none;background:radial-gradient(circle at 40% 25%,var(--acc),transparent 55%),radial-gradient(circle at 72% 72%,var(--acc2),transparent 55%);}
.fp-body{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;padding:calc(20px + env(safe-area-inset-top)) 22px calc(16px + env(safe-area-inset-bottom));}
.fp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.fp-close{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.fp-close svg{width:18px;height:18px;stroke:var(--w2);fill:none;stroke-width:2;}
.fp-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--w2);text-transform:uppercase;letter-spacing:2px;}
.fp-art-wrap{display:flex;justify-content:center;margin-bottom:24px;}
.fp-art{width:min(255px,70vw);height:min(255px,70vw);border-radius:20px;object-fit:cover;box-shadow:0 16px 48px rgba(0,0,0,.65);transition:.3s;}
.fp-art.pulse{box-shadow:0 16px 48px rgba(124,77,255,.5),0 0 0 3px rgba(124,77,255,.22);}
.fp-art-ph{width:min(255px,70vw);height:min(255px,70vw);border-radius:20px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:70px;box-shadow:0 16px 48px rgba(0,0,0,.65);}
.fp-meta{display:flex;align-items:center;gap:8px;margin-bottom:18px;}
.fp-meta-info{flex:1;min-width:0;}
.fp-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fp-artist{font-size:13px;color:var(--w2);margin-top:3px;}
.fp-like{width:36px;height:36px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fp-like svg{width:23px;height:23px;stroke:var(--w3);fill:none;stroke-width:2;transition:.2s;}
.fp-like.liked svg{stroke:var(--acc2);fill:var(--acc2);}
.prog-wrap{margin-bottom:18px;}
.prog-bar{width:100%;height:4px;background:var(--bg3);border-radius:4px;cursor:pointer;position:relative;}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--acc2));width:0%;transition:.25s linear;position:relative;}
.prog-fill::after{content:'';position:absolute;right:-5px;top:-4px;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(124,77,255,.5);}
.prog-times{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--w3);}
.fp-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.cb{width:46px;height:46px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;}
.cb svg{width:22px;height:22px;stroke:var(--w2);fill:none;stroke-width:1.8;transition:.2s;}
.cb.on svg{stroke:var(--acc);}
.c-play{width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 22px rgba(124,77,255,.5);}
.c-play:active{transform:scale(.93);}
.c-play svg{width:26px;height:26px;fill:#fff;}
.fp-vol{display:flex;align-items:center;gap:10px;}
.vol-ico{background:none;border:none;cursor:pointer;}
.vol-ico svg{width:16px;height:16px;stroke:var(--w3);fill:none;stroke-width:1.8;}
input[type=range].vol{flex:1;-webkit-appearance:none;height:4px;background:var(--bg3);border-radius:4px;outline:none;}
input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;}

/* SC badge */
.sc-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,68,0,.15);border:1px solid rgba(255,68,0,.3);border-radius:10px;padding:3px 9px;font-size:10px;font-weight:700;color:#ff6633;margin-bottom:8px;}

/* TOAST */
#toast{position:fixed;bottom:calc(140px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(12px);background:rgba(26,26,46,.96);border:1px solid rgba(124,77,255,.3);padding:9px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;z-index:9999;backdrop-filter:blur(12px);}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- SoundCloud Widget caché -->
<div id="sc-wrap">
  <iframe id="sc-iframe"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/soundcloud-checkout/sets/weekly-top-tracks&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"
    allow="autoplay">
  </iframe>
</div>

<div id="app">
  <div id="main">

    <!-- HOME -->
    <div id="page-home" class="page on">
      <div class="topbar"><div class="logo">YouSong</div></div>
      <div class="srch-wrap">
        <div class="srch-box">
          <svg class="srch-ico" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="srch-inp" placeholder="Artiste, titre..." autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="srch-clr" id="srch-clr">✕</button>
        </div>
      </div>
      <div id="srch-results" style="display:none">
        <div class="sec"><div class="sec-t">🔍 Résultats</div><div class="slist" id="results-list"></div></div>
      </div>
      <div id="home-cnt">
        <div class="sec"><div class="sec-t">🎸 Genres</div></div>
        <div class="genre-row">
          <button class="gpill" style="background:linear-gradient(135deg,#7c4dff,#e040fb)" onclick="sg('rap français')">🎤 Rap FR</button>
          <button class="gpill" style="background:linear-gradient(135deg,#ff6d00,#ff9800)" onclick="sg('pop hits 2024')">🌟 Pop</button>
          <button class="gpill" style="background:linear-gradient(135deg,#00acc1,#0097a7)" onclick="sg('rnb soul')">🎵 R&B</button>
          <button class="gpill" style="background:linear-gradient(135deg,#e91e63,#c2185b)" onclick="sg('rock')">🎸 Rock</button>
          <button class="gpill" style="background:linear-gradient(135deg,#43a047,#2e7d32)" onclick="sg('afrobeats')">🥁 Afro</button>
          <button class="gpill" style="background:linear-gradient(135deg,#5c6bc0,#3949ab)" onclick="sg('drill uk')">🔊 Drill</button>
          <button class="gpill" style="background:linear-gradient(135deg,#f4511e,#bf360c)" onclick="sg('reggaeton')">🌴 Latino</button>
        </div>
        <div class="sec" style="margin-top:22px"><div class="sec-t">🔥 Tendances</div></div>
        <div class="hscroll" id="trending"></div>
        <div class="sec" style="margin-top:22px"><div class="sec-t">⚡ Découverte</div></div>
        <div class="sec" style="padding-top:0"><div class="slist" id="discover"></div></div>
      </div>
    </div>

    <!-- LIKED -->
    <div id="page-liked" class="page">
      <div class="topbar"><div class="logo">❤️ Likés</div></div>
      <div class="sec"><div class="slist" id="liked-list"></div></div>
    </div>

    <!-- EXPLORE -->
    <div id="page-explore" class="page">
      <div class="topbar"><div class="logo">🔎 Explorer</div></div>
      <div class="srch-wrap">
        <div class="srch-box">
          <svg class="srch-ico" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="srch2-inp" placeholder="Rechercher..." autocomplete="off" autocorrect="off">
        </div>
      </div>
      <div class="sec"><div class="slist" id="explore-list"></div></div>
    </div>
  </div>

  <nav id="nav">
    <button class="ni on" id="ni-home" onclick="showPage('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Accueil</span>
    </button>
    <button class="ni" id="ni-explore" onclick="showPage('explore')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Explorer</span>
    </button>
    <button class="ni" id="ni-liked" onclick="showPage('liked')">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Likés</span>
    </button>
  </nav>
</div>

<!-- MINI PLAYER -->
<div id="mini-p">
  <div class="mp-in" onclick="openFP()">
    <div class="mp-art-ph" id="mp-art">🎵</div>
    <div class="mp-info">
      <div class="mp-title" id="mp-title">—</div>
      <div class="mp-artist" id="mp-artist">—</div>
    </div>
    <div class="mp-btns" onclick="event.stopPropagation()">
      <button class="mpb" onclick="prev()"><svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20" fill="white"/><line x1="5" y1="19" x2="5" y2="5" stroke="white" stroke-width="2.5" fill="none"/></svg></button>
      <button class="mpb big" id="mp-play" onclick="togglePlay()"><svg id="mp-ico" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <button class="mpb" onclick="next()"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4" fill="white"/><line x1="19" y1="5" x2="19" y2="19" stroke="white" stroke-width="2.5" fill="none"/></svg></button>
    </div>
  </div>
</div>

<!-- FULL PLAYER -->
<div id="full-p">
  <div class="fp-bg"></div>
  <div class="fp-body">
    <div class="fp-top">
      <button class="fp-close" onclick="closeFP()"><svg viewBox="0 0 24 24" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>
      <div class="fp-label">En écoute</div>
      <div style="width:36px"></div>
    </div>
    <div class="fp-art-wrap"><div class="fp-art-ph" id="fp-art">🎵</div></div>
    <div class="fp-meta">
      <div class="fp-meta-info">
        <div class="fp-name" id="fp-name">—</div>
        <div class="fp-artist" id="fp-artist-lbl">—</div>
      </div>
      <button class="fp-like" id="fp-like" onclick="toggleLike()"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar" id="prog-bar" onclick="seek(event)"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-times"><span id="t-cur">0:00</span><span id="t-tot">0:00</span></div>
    </div>
    <div class="fp-ctrl">
      <button class="cb" id="shuf-btn" onclick="toggleShuf()"><svg viewBox="0 0 24 24" stroke-width="1.8"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></button>
      <button class="cb" onclick="prev()"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
      <button class="c-play" onclick="togglePlay()"><svg id="fp-ico" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <button class="cb" onclick="next()"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
      <button class="cb" id="rep-btn" onclick="toggleRep()"><svg viewBox="0 0 24 24" stroke-width="1.8"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
    </div>
    <div class="fp-vol">
      <button class="vol-ico"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/></svg></button>
      <input type="range" class="vol" id="vol-r" min="0" max="100" value="80" oninput="setVol(this.value)">
      <button class="vol-ico"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- SoundCloud Widget API -->
<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// ══ SOUNDCLOUD WIDGET ══
let scWidget = null;
let scReady = false;
let pendingTrackUrl = null;
let scDuration = 0;
let scPosition = 0;

function initSC() {
  const iframe = document.getElementById('sc-iframe');
  scWidget = SC.Widget(iframe);

  scWidget.bind(SC.Widget.Events.READY, () => {
    scReady = true;
    scWidget.setVolume(80);
    if (pendingTrackUrl) {
      loadSCTrack(pendingTrackUrl);
      pendingTrackUrl = null;
    }
  });

  scWidget.bind(SC.Widget.Events.PLAY, () => {
    isPlaying = true;
    updIcons(); updRows(); startProgLoop();
  });

  scWidget.bind(SC.Widget.Events.PAUSE, () => {
    isPlaying = false;
    updIcons(); updRows(); stopProgLoop();
  });

  scWidget.bind(SC.Widget.Events.FINISH, () => {
    stopProgLoop();
    if (isRepeat) { scWidget.seekTo(0); scWidget.play(); }
    else next();
  });

  scWidget.bind(SC.Widget.Events.ERROR, () => {
    toast('❌ Intro non streamable, piste suivante...');
    setTimeout(next, 1500);
  });

  scWidget.bind(SC.Widget.Events.PLAY_PROGRESS, (obj) => {
    scPosition = obj.currentPosition;
    scDuration = obj.relativePosition > 0 ? obj.currentPosition / obj.relativePosition : 0;
    if (scDuration > 0) {
      const pct = (scPosition / scDuration) * 100;
      document.getElementById('prog-fill').style.width = pct + '%';
      document.getElementById('t-cur').textContent = fmtTime(scPosition / 1000);
      document.getElementById('t-tot').textContent = fmtTime(scDuration / 1000);
    }
  });
}

function loadSCTrack(url) {
  scWidget.load(url, {
    auto_play: true,
    hide_related: true,
    show_comments: false,
    show_user: false,
    show_reposts: false,
    buying: false,
    liking: false,
    download: false,
    sharing: false
  });
}

// Attend que SC Widget API soit dispo
function waitSC() {
  if (typeof SC !== 'undefined') { initSC(); }
  else { setTimeout(waitSC, 100); }
}
waitSC();

// ══ ETAT ══
let queue = [], qIdx = 0, cur = null;
let isPlaying = false, isShuffle = false, isRepeat = false;
let liked = JSON.parse(localStorage.getItem('ys_liked') || '[]');
let srchTimer = null;
let progLoop = null;

// ══ ITUNES (métadonnées + covers) ══
const ITUNES = 'https://itunes.apple.com';

async function itunesSearch(q, limit = 20) {
  const res = await fetch(`${ITUNES}/search?term=${encodeURIComponent(q)}&entity=song&limit=${limit}&country=fr`);
  const data = await res.json();
  return (data.results || []).filter(t => t.trackName);
}

// ══ SOUNDCLOUD SEARCH (via oEmbed + recherche publique) ══
// On utilise l'API oEmbed de SoundCloud pour résoudre les URLs
// et l'endpoint de recherche public (sans clé pour les tracks streamables)
async function findSCTrack(title, artist) {
  const q = encodeURIComponent(`${title} ${artist}`);
  // Endpoint de recherche SoundCloud public (pas besoin de clé pour lire)
  try {
    const res = await fetch(`https://api-v2.soundcloud.com/search/tracks?q=${q}&limit=1&client_id=iZIs9mchVcX5lhVRyQGGAYlNPVldzAoX`);
    const data = await res.json();
    if (data.collection && data.collection.length > 0) {
      const track = data.collection[0];
      // Vérifier que le track est streamable
      if (track.streamable && track.permalink_url) {
        return track.permalink_url;
      }
    }
  } catch (e) {}

  // Fallback: construire URL directe SoundCloud et tenter oEmbed
  try {
    const fallbackQ = encodeURIComponent(`${title} ${artist}`);
    const oembed = await fetch(`https://soundcloud.com/oembed?format=json&url=https://soundcloud.com/search?q=${fallbackQ}`);
  } catch(e) {}

  return null;
}

// ══ PAGES ══
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(el => el.classList.remove('on'));
  document.getElementById('page-' + p).classList.add('on');
  document.getElementById('ni-' + p).classList.add('on');
  if (p === 'liked') renderLiked();
}

// ══ SEARCH UI ══
const inp = document.getElementById('srch-inp');
const clr = document.getElementById('srch-clr');
inp.addEventListener('input', () => {
  const q = inp.value.trim();
  clr.classList.toggle('v', !!q);
  clearTimeout(srchTimer);
  if (!q) { hideSearch(); return; }
  srchTimer = setTimeout(() => doSearch(q), 600);
});
clr.addEventListener('click', () => { inp.value = ''; clr.classList.remove('v'); hideSearch(); });

document.getElementById('srch2-inp').addEventListener('input', function () {
  clearTimeout(srchTimer);
  const q = this.value.trim();
  if (!q) { document.getElementById('explore-list').innerHTML = ''; return; }
  srchTimer = setTimeout(() => doSearchIn(q, 'explore-list'), 600);
});

function hideSearch() {
  document.getElementById('srch-results').style.display = 'none';
  document.getElementById('home-cnt').style.display = 'block';
}

async function doSearch(q) {
  document.getElementById('srch-results').style.display = 'block';
  document.getElementById('home-cnt').style.display = 'none';
  const list = document.getElementById('results-list');
  list.innerHTML = mkLoader();
  try {
    // Chercher d'abord sur SoundCloud directement
    const scResults = await searchSC(q, 20);
    if (scResults.length) {
      queue = scResults; qIdx = 0;
      renderSCList(scResults, list);
      return;
    }
    // Fallback iTunes si SC vide
    const songs = await itunesSearch(q, 20);
    if (!songs.length) { list.innerHTML = mkEmpty('😕', 'Aucun résultat pour "' + esc(q) + '"'); return; }
    queue = songs; qIdx = 0;
    renderList(songs, list);
  } catch (e) { list.innerHTML = mkEmpty('⚠️', 'Erreur de connexion.'); }
}

async function doSearchIn(q, listId) {
  const list = document.getElementById(listId);
  list.innerHTML = mkLoader();
  try {
    const scResults = await searchSC(q, 15);
    if (scResults.length) { renderSCList(scResults, list); return; }
    const songs = await itunesSearch(q, 15);
    if (!songs.length) { list.innerHTML = mkEmpty('😕', 'Aucun résultat'); return; }
    renderList(songs, list);
  } catch (e) { list.innerHTML = mkEmpty('⚠️', 'Erreur réseau'); }
}

async function sg(g) { inp.value = g; clr.classList.add('v'); await doSearch(g); }

// ══ SOUNDCLOUD API v2 ══
// Client ID public SoundCloud (extrait du widget officiel, fonctionnel en lecture seule)
const SC_CLIENT_ID = 'iZIs9mchVcX5lhVRyQGGAYlNPVldzAoX';

async function searchSC(q, limit = 20) {
  try {
    const res = await fetch(
      `https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(q)}&limit=${limit}&client_id=${SC_CLIENT_ID}`
    );
    if (!res.ok) return [];
    const data = await res.json();
    return (data.collection || []).filter(t => t.streamable && t.permalink_url).map(t => ({
      type: 'sc',
      trackId: t.id,
      trackName: t.title,
      artistName: t.user ? t.user.username : '—',
      artworkUrl100: t.artwork_url ? t.artwork_url.replace('large', 't300x300') : '',
      artworkUrl600: t.artwork_url ? t.artwork_url.replace('large', 't500x500') : '',
      scUrl: t.permalink_url,
      trackTimeMillis: t.duration || 0,
      duration: t.duration || 0
    }));
  } catch (e) {
    return [];
  }
}

// ══ RENDER SC ══
function renderSCList(songs, container) {
  container.innerHTML = '';
  songs.forEach((s, i) => container.appendChild(mkSCRow(s, i, songs)));
}

function mkSCRow(s, idx, arr) {
  const isCur = cur && cur.trackId === s.trackId;
  const row = document.createElement('div');
  row.className = 'srow' + (isCur ? ' cur' : '');
  row.id = 'row-' + s.trackId;
  const img = s.artworkUrl100 || '';
  const artist = s.artistName || '—';
  const title = s.trackName || '?';
  const dur = fmtTime(Math.floor((s.trackTimeMillis || 0) / 1000));
  row.innerHTML = `
    ${img ? `<img class="sthumb" src="${esc(img)}" alt="" onerror="this.style.display='none'">` : `<div class="sthumb-ph" style="background:${grad(s.trackId)}">🎵</div>`}
    <div class="sinfo"><div class="stitle">${esc(title)}</div><div class="sartist">${esc(artist)}</div></div>
    <div class="sbars ${isCur && isPlaying ? 'on' : ''}" id="bars-${s.trackId}"><span></span><span></span><span></span><span></span></div>
    <span class="sdur">${dur}</span>`;
  row.addEventListener('click', () => { queue = arr; qIdx = idx; playSong(s); });
  return row;
}

// ══ RENDER ITUNES (fallback) ══
function renderList(songs, container) {
  container.innerHTML = '';
  songs.forEach((s, i) => container.appendChild(mkRow(s, i, songs)));
}

function mkRow(s, idx, arr) {
  const isCur = cur && cur.trackId === s.trackId;
  const row = document.createElement('div');
  row.className = 'srow' + (isCur ? ' cur' : '');
  row.id = 'row-' + s.trackId;
  const img = s.artworkUrl100 || '';
  const artist = s.artistName || '—';
  const title = s.trackName || '?';
  const dur = fmtTime(Math.floor((s.trackTimeMillis || 0) / 1000));
  row.innerHTML = `
    ${img ? `<img class="sthumb" src="${esc(img)}" alt="" onerror="this.style.display='none'">` : `<div class="sthumb-ph" style="background:${grad(s.trackId)}">🎵</div>`}
    <div class="sinfo"><div class="stitle">${esc(title)}</div><div class="sartist">${esc(artist)}</div></div>
    <div class="sbars ${isCur && isPlaying ? 'on' : ''}" id="bars-${s.trackId}"><span></span><span></span><span></span><span></span></div>
    <span class="sdur">${dur}</span>`;
  row.addEventListener('click', () => { queue = arr; qIdx = idx; playSong(s); });
  return row;
}

// ══ PLAY ══
async function playSong(s) {
  cur = s;
  updateMini(); updateFull();

  // Si le morceau a déjà une URL SoundCloud
  if (s.type === 'sc' && s.scUrl) {
    toast('⏳ Chargement SoundCloud...');
    if (scReady) {
      loadSCTrack(s.scUrl);
    } else {
      pendingTrackUrl = s.scUrl;
    }
    return;
  }

  // Sinon (iTunes fallback) : chercher sur SoundCloud
  toast('⏳ Recherche sur SoundCloud...');
  try {
    const scResults = await searchSC(`${s.trackName} ${s.artistName}`, 3);
    if (scResults.length && scResults[0].scUrl) {
      const url = scResults[0].scUrl;
      // Enrichir le cur avec l'image SC si pas d'image
      if (!cur.artworkUrl100 && scResults[0].artworkUrl100) {
        cur.artworkUrl100 = scResults[0].artworkUrl100;
        cur.artworkUrl600 = scResults[0].artworkUrl600;
        updateFull();
      }
      toast('▶️ ' + esc(s.trackName || ''));
      if (scReady) { loadSCTrack(url); }
      else { pendingTrackUrl = url; }
    } else {
      toast('❌ Introuvable sur SoundCloud');
    }
  } catch (e) {
    toast('❌ Erreur : ' + e.message);
  }
}

function togglePlay() {
  if (!scReady || !cur) return;
  if (isPlaying) { scWidget.pause(); }
  else { scWidget.play(); }
}

function next() {
  if (!queue.length) return;
  qIdx = isShuffle ? Math.floor(Math.random() * queue.length) : (qIdx + 1) % queue.length;
  playSong(queue[qIdx]);
}

function prev() {
  if (!cur || !scReady) return;
  if (scPosition > 3000) { scWidget.seekTo(0); return; }
  qIdx = (qIdx - 1 + queue.length) % queue.length;
  playSong(queue[qIdx]);
}

function seek(e) {
  if (!scReady || !cur || scDuration === 0) return;
  const bar = document.getElementById('prog-bar');
  const pct = (e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth;
  scWidget.seekTo(pct * scDuration);
}

function setVol(v) { if (scReady) scWidget.setVolume(parseInt(v)); }
function toggleShuf() { isShuffle = !isShuffle; document.getElementById('shuf-btn').classList.toggle('on', isShuffle); }
function toggleRep() { isRepeat = !isRepeat; document.getElementById('rep-btn').classList.toggle('on', isRepeat); }
function openFP() { document.getElementById('full-p').classList.add('open'); }
function closeFP() { document.getElementById('full-p').classList.remove('open'); }

// ══ PROGRESS LOOP ══
// La barre de progression est mise à jour via l'event PLAY_PROGRESS de SC
// On garde un fallback loop pour les cas où l'event ne se déclenche pas
function startProgLoop() {
  stopProgLoop();
  progLoop = setInterval(() => {
    if (!scReady || !cur) return;
    try {
      scWidget.getPosition(pos => {
        scWidget.getDuration(dur => {
          if (dur > 0) {
            document.getElementById('prog-fill').style.width = ((pos / dur) * 100) + '%';
            document.getElementById('t-cur').textContent = fmtTime(pos / 1000);
            document.getElementById('t-tot').textContent = fmtTime(dur / 1000);
            scPosition = pos;
            scDuration = dur;
          }
        });
      });
    } catch (e) {}
  }, 800);
}
function stopProgLoop() { if (progLoop) { clearInterval(progLoop); progLoop = null; } }

// ══ UI ══
function updateMini() {
  if (!cur) return;
  document.getElementById('mini-p').classList.add('show');
  document.getElementById('mp-title').textContent = cur.trackName || '—';
  document.getElementById('mp-artist').textContent = cur.artistName || '—';
  const img = cur.artworkUrl100;
  const el = document.getElementById('mp-art');
  if (img) {
    const newEl = document.createElement('img');
    newEl.className = 'mp-art'; newEl.id = 'mp-art'; newEl.src = esc(img); newEl.alt = '';
    newEl.onerror = function() { this.outerHTML = '<div class="mp-art-ph" id="mp-art">🎵</div>'; };
    el.parentNode.replaceChild(newEl, el);
  } else { el.className = 'mp-art-ph'; el.id = 'mp-art'; el.textContent = '🎵'; }
}

function updateFull() {
  if (!cur) return;
  document.getElementById('fp-name').textContent = cur.trackName || '—';
  document.getElementById('fp-artist-lbl').textContent = cur.artistName || '—';
  const img = cur.artworkUrl600 || (cur.artworkUrl100 || '').replace('100x100', '600x600').replace('t300x300', 't500x500');
  const el = document.getElementById('fp-art');
  if (img) {
    const newEl = document.createElement('img');
    newEl.className = 'fp-art'; newEl.id = 'fp-art'; newEl.src = esc(img); newEl.alt = '';
    el.parentNode.replaceChild(newEl, el);
  } else { el.className = 'fp-art-ph'; el.id = 'fp-art'; el.textContent = '🎵'; }
  document.getElementById('fp-like').classList.toggle('liked', liked.some(l => l.trackId === cur.trackId));
}

function updIcons() {
  const PAUSE_ACC = '<rect x="6" y="4" width="4" height="16" fill="var(--acc)"/><rect x="14" y="4" width="4" height="16" fill="var(--acc)"/>';
  const PAUSE_W = '<rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/>';
  const PLAY_ACC = '<polygon points="5 3 19 12 5 21 5 3" fill="var(--acc)"/>';
  const PLAY_W = '<polygon points="5 3 19 12 5 21 5 3" fill="white"/>';
  document.getElementById('mp-ico').innerHTML = isPlaying ? PAUSE_ACC : PLAY_ACC;
  document.getElementById('fp-ico').innerHTML = isPlaying ? PAUSE_W : PLAY_W;
  const art = document.getElementById('fp-art');
  if (art) art.classList.toggle('pulse', isPlaying);
}

function updRows() {
  document.querySelectorAll('.srow').forEach(row => {
    const rid = row.id.replace('row-', '');
    const isCur = cur && String(cur.trackId) === rid;
    row.classList.toggle('cur', isCur);
    const bars = document.getElementById('bars-' + rid);
    if (bars) bars.classList.toggle('on', isCur && isPlaying);
  });
}

// ══ LIKE ══
function toggleLike() {
  if (!cur) return;
  const idx = liked.findIndex(l => l.trackId === cur.trackId);
  if (idx >= 0) { liked.splice(idx, 1); toast('💔 Retiré'); }
  else { liked.unshift({ ...cur }); toast('❤️ Ajouté aux likés'); }
  localStorage.setItem('ys_liked', JSON.stringify(liked));
  document.getElementById('fp-like').classList.toggle('liked', idx < 0);
}

function renderLiked() {
  const list = document.getElementById('liked-list');
  if (!liked.length) { list.innerHTML = mkEmpty('🎵', 'Aucun titre liké.<br>Appuie sur ❤️ dans le player.'); return; }
  list.innerHTML = '';
  liked.forEach((s, i) => {
    if (s.type === 'sc') list.appendChild(mkSCRow(s, i, liked));
    else list.appendChild(mkRow(s, i, liked));
  });
}

// ══ HOME ══
const TRENDING_Q = ['Drake', 'Jul', 'Ninho', 'The Weeknd', 'Burna Boy', 'Bad Bunny', 'Rema', 'Wizkid', 'Sch', 'Damso'];
const DISC_Q = ['hits 2024', 'afrobeats', 'rnb soul', 'rap nouveautés', 'top pop'];

async function loadHome() {
  // Trending : SoundCloud d'abord
  try {
    const q = TRENDING_Q[Math.floor(Math.random() * TRENDING_Q.length)];
    const songs = await searchSC(q, 10);
    const wrap = document.getElementById('trending');
    wrap.innerHTML = '';
    if (songs.length) {
      songs.forEach((s, i) => {
        const img = s.artworkUrl100 || '';
        const card = document.createElement('div');
        card.className = 'acard';
        card.innerHTML = `${img ? `<img class="acard-img" src="${esc(img)}" alt="">` : `<div class="acard-img-ph" style="background:${grad(s.trackId)}">🎵</div>`}<div class="acard-title">${esc(s.trackName || '')}</div><div class="acard-sub">${esc(s.artistName || '')}</div>`;
        card.addEventListener('click', () => { queue = songs; qIdx = i; playSong(s); });
        wrap.appendChild(card);
      });
    }
  } catch (e) {}

  // Découverte
  try {
    const q = DISC_Q[Math.floor(Math.random() * DISC_Q.length)];
    const songs = await searchSC(q, 8);
    if (songs.length) {
      renderSCList(songs, document.getElementById('discover'));
    } else {
      // Fallback iTunes
      const it = await itunesSearch(q, 8);
      renderList(it, document.getElementById('discover'));
    }
  } catch (e) {}
}

// ══ UTILS ══
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}
function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
const GS = ['linear-gradient(135deg,#7c4dff,#e040fb)', 'linear-gradient(135deg,#ff6d00,#ff9800)', 'linear-gradient(135deg,#00acc1,#0097a7)', 'linear-gradient(135deg,#e91e63,#c2185b)', 'linear-gradient(135deg,#43a047,#2e7d32)'];
function grad(id) { let h = 0; String(id).split('').forEach(c => h = (h * 31 + c.charCodeAt(0)) | 0); return GS[Math.abs(h) % GS.length]; }
function mkLoader() { return '<div class="loader"><span></span><span></span><span></span></div>'; }
function mkEmpty(ico, txt) { return `<div class="empty"><span class="ei">${ico}</span>${txt}</div>`; }
let toastTmr = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  if (toastTmr) clearTimeout(toastTmr);
  toastTmr = setTimeout(() => t.classList.remove('on'), 3000);
}

// ══ INIT ══
loadHome();
</script>
