<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>YouSong</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#1a1a24;
  --card:#16161f;
  --accent:#7c4dff;
  --accent2:#e040fb;
  --green:#1db954;
  --w:#fff;
  --w2:rgba(255,255,255,.55);
  --w3:rgba(255,255,255,.25);
  --r:16px;
  --bar:64px;
}
html,body{height:100%;background:var(--bg);color:var(--w);font-family:'DM Sans',sans-serif;overflow:hidden;}
/* SCROLLBAR */
::-webkit-scrollbar{width:0;height:0;}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#main{flex:1;overflow-y:auto;padding-bottom:calc(var(--bar) + 80px);}

/* ── TOPBAR ── */
.topbar{padding:calc(16px + env(safe-area-inset-top)) 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:linear-gradient(var(--bg) 80%,transparent);}
.topbar-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-right{display:flex;gap:12px;align-items:center;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icon-btn svg{width:18px;height:18px;fill:var(--w2);}

/* ── SEARCH BAR ── */
.search-wrap{padding:0 20px 16px;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:14px;padding:12px 16px;border:1.5px solid transparent;transition:.2s;}
.search-box:focus-within{border-color:var(--accent);}
.search-box svg{width:18px;height:18px;fill:var(--w3);flex-shrink:0;}
.search-box input{background:none;border:none;outline:none;color:var(--w);font-size:15px;font-family:'DM Sans',sans-serif;flex:1;font-weight:500;}
.search-box input::placeholder{color:var(--w3);}
.search-clear{background:none;border:none;color:var(--w3);font-size:18px;cursor:pointer;display:none;}
.search-clear.show{display:block;}

/* ── SECTIONS ── */
.section{padding:0 20px 8px;}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title span{font-size:20px;}

/* ── SEARCH RESULTS ── */
#results-list{display:flex;flex-direction:column;gap:6px;}
.song-row{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:14px;cursor:pointer;transition:.15s;position:relative;overflow:hidden;}
.song-row:active{transform:scale(.98);}
.song-row.playing{background:linear-gradient(135deg,rgba(124,77,255,.18),rgba(224,64,251,.1));}
.song-row.playing::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--accent),var(--accent2));border-radius:0 3px 3px 0;}
.song-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.song-thumb-placeholder{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.song-info{flex:1;min-width:0;}
.song-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--w);}
.song-artist{font-size:12px;color:var(--w2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-dur{font-size:11px;color:var(--w3);flex-shrink:0;}
.song-more{width:28px;height:28px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.song-more svg{width:16px;height:16px;fill:var(--w3);}
.playing-anim{display:none;align-items:flex-end;gap:2px;height:16px;flex-shrink:0;}
.playing-anim.active{display:flex;}
.playing-anim span{width:3px;background:linear-gradient(var(--accent),var(--accent2));border-radius:2px;animation:wave 1s ease-in-out infinite;}
.playing-anim span:nth-child(1){height:6px;animation-delay:0s;}
.playing-anim span:nth-child(2){height:12px;animation-delay:.2s;}
.playing-anim span:nth-child(3){height:8px;animation-delay:.4s;}
.playing-anim span:nth-child(4){height:14px;animation-delay:.1s;}
@keyframes wave{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.4);}}

/* ── HOME CARDS ── */
.cards-scroll{display:flex;gap:14px;overflow-x:auto;padding:0 20px 4px;-webkit-overflow-scrolling:touch;}
.cards-scroll::-webkit-scrollbar{height:0;}
.genre-card{flex-shrink:0;width:130px;height:80px;border-radius:14px;display:flex;align-items:flex-end;padding:10px;cursor:pointer;position:relative;overflow:hidden;transition:.2s;}
.genre-card:active{transform:scale(.96);}
.genre-card-emoji{position:absolute;top:8px;right:8px;font-size:28px;opacity:.8;}
.genre-card-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#fff;z-index:1;text-shadow:0 1px 4px rgba(0,0,0,.5);}

/* ── TRENDING ── */
.trend-scroll{display:flex;gap:14px;overflow-x:auto;padding:0 20px 4px;-webkit-overflow-scrolling:touch;}
.trend-card{flex-shrink:0;width:140px;cursor:pointer;transition:.2s;}
.trend-card:active{transform:scale(.96);}
.trend-art{width:140px;height:140px;border-radius:14px;background:var(--bg3);object-fit:cover;display:block;}
.trend-art-ph{width:140px;height:140px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:40px;}
.trend-name{font-size:13px;font-weight:600;margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trend-artist{font-size:11px;color:var(--w2);margin-top:2px;}

/* ── NOW PLAYING BAR ── */
#player-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:0 12px calc(12px + env(safe-area-inset-bottom));pointer-events:none;}
#player-bar.active{pointer-events:all;}
.player-mini{background:linear-gradient(135deg,rgba(124,77,255,.95),rgba(224,64,251,.95));backdrop-filter:blur(20px);border-radius:18px;padding:10px 14px;display:flex;align-items:center;gap:12px;transform:translateY(120%);transition:transform .4s cubic-bezier(.34,1.56,.64,1);cursor:pointer;box-shadow:0 8px 32px rgba(124,77,255,.4);}
.player-mini.show{transform:translateY(0);}
.player-mini-art{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.15);}
.player-mini-art-ph{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.player-mini-info{flex:1;min-width:0;}
.player-mini-title{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-mini-artist{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px;}
.player-mini-ctrl{display:flex;align-items:center;gap:8px;}
.pmb{width:36px;height:36px;background:rgba(255,255,255,.2);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pmb svg{width:16px;height:16px;fill:white;}
.pmb.play-btn{width:40px;height:40px;background:white;}
.pmb.play-btn svg{fill:var(--accent);}

/* ── PLAYER FULL ── */
#player-full{position:fixed;inset:0;z-index:500;background:var(--bg);transform:translateY(100%);transition:transform .4s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;}
#player-full.open{transform:translateY(0);}
.pf-bg{position:absolute;inset:0;z-index:0;opacity:.3;filter:blur(80px);background:radial-gradient(circle at 50% 30%,var(--accent),transparent 60%),radial-gradient(circle at 80% 70%,var(--accent2),transparent 60%);}
.pf-content{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;padding:calc(20px + env(safe-area-inset-top)) 24px calc(20px + env(safe-area-inset-bottom));}
.pf-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.pf-close{width:36px;height:36px;background:var(--bg3);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pf-close svg{width:18px;height:18px;fill:var(--w2);}
.pf-title-top{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--w2);text-transform:uppercase;letter-spacing:2px;}
.pf-more{width:36px;height:36px;background:var(--bg3);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pf-more svg{width:18px;height:18px;fill:var(--w2);}
.pf-art-wrap{display:flex;justify-content:center;margin-bottom:32px;}
.pf-art{width:min(280px,70vw);height:min(280px,70vw);border-radius:20px;object-fit:cover;box-shadow:0 20px 60px rgba(0,0,0,.6);transition:.3s;}
.pf-art.playing{box-shadow:0 20px 60px rgba(124,77,255,.5),0 0 0 3px rgba(124,77,255,.3);}
.pf-art-ph{width:min(280px,70vw);height:min(280px,70vw);border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:80px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.pf-info{margin-bottom:24px;}
.pf-song-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;}
.pf-song-artist{font-size:15px;color:var(--w2);font-weight:500;}
.pf-like{width:32px;height:32px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;}
.pf-like svg{width:22px;height:22px;fill:none;stroke:var(--w3);stroke-width:2;transition:.2s;}
.pf-like.liked svg{fill:var(--accent2);stroke:var(--accent2);}
.pf-info-row{display:flex;align-items:center;}
/* PROGRESS */
.pf-progress{margin-bottom:24px;}
.progress-bar{width:100%;height:4px;background:var(--bg3);border-radius:4px;position:relative;cursor:pointer;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;width:0%;transition:.3s linear;position:relative;}
.progress-fill::after{content:'';position:absolute;right:-6px;top:-4px;width:12px;height:12px;background:white;border-radius:50%;box-shadow:0 0 8px rgba(124,77,255,.5);}
.progress-times{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--w3);font-weight:500;}
/* CONTROLS */
.pf-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.ctrl-btn{width:44px;height:44px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;}
.ctrl-btn svg{width:22px;height:22px;fill:var(--w2);}
.ctrl-btn.active svg{fill:var(--accent);}
.play-big{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 24px rgba(124,77,255,.5);transition:.1s;}
.play-big:active{transform:scale(.94);}
.play-big svg{width:28px;height:28px;fill:white;}
/* VOLUME */
.pf-volume{display:flex;align-items:center;gap:10px;}
.vol-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;}
.vol-btn svg{width:18px;height:18px;fill:var(--w3);}
.vol-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--bg3);border-radius:4px;outline:none;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:white;cursor:pointer;}

/* ── EMPTY / LOADING ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--w3);}
.empty-state .big-emoji{font-size:48px;margin-bottom:8px;}
.empty-state p{font-size:14px;text-align:center;line-height:1.6;}
.loader{display:flex;gap:6px;align-items:center;justify-content:center;padding:40px;}
.loader span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce .8s ease-in-out infinite;}
.loader span:nth-child(2){animation-delay:.15s;background:var(--accent2);}
.loader span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--bar) + 90px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--bg3);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;z-index:9999;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── NAV ── */
#nav{position:fixed;bottom:0;left:0;right:0;padding:8px 0 calc(8px + env(safe-area-inset-bottom));background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);display:flex;z-index:150;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;cursor:pointer;border:none;background:none;}
.ni svg{width:22px;height:22px;fill:var(--w3);transition:.2s;}
.ni span{font-size:10px;color:var(--w3);font-weight:600;transition:.2s;}
.ni.on svg{fill:var(--accent);}
.ni.on span{color:var(--accent);}

/* ── PAGES ── */
.page{display:none;}
.page.on{display:block;}

/* ── LIKED PAGE ── */
#liked-list{display:flex;flex-direction:column;gap:6px;padding:0 20px;}

/* ── PLAYLIST PAGE ── */
.playlist-header{padding:20px 20px 0;display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.playlist-art-big{width:100px;height:100px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0;}
.playlist-info strong{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;display:block;margin-bottom:4px;}
.playlist-info span{font-size:13px;color:var(--w2);}
.playlist-play-btn{margin-left:auto;width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(124,77,255,.4);}
.playlist-play-btn svg{width:22px;height:22px;fill:white;}
</style>
</head>
<body>
<div id="app">
  <div id="main">

    <!-- PAGE HOME -->
    <div id="page-home" class="page on">
      <div class="topbar">
        <div class="topbar-logo">YouSong</div>
        <div class="topbar-right">
          <button class="icon-btn"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        </div>
      </div>
      <div class="search-wrap">
        <div class="search-box">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          <input type="text" id="search-inp" placeholder="Recherche une musique..." autocomplete="off">
          <button class="search-clear" id="search-clear">✕</button>
        </div>
      </div>

      <!-- SEARCH RESULTS -->
      <div id="search-results" style="display:none">
        <div class="section">
          <div class="section-title"><span>🔍</span> Résultats</div>
          <div id="results-list"></div>
        </div>
      </div>

      <!-- HOME CONTENT -->
      <div id="home-content">
        <div class="section">
          <div class="section-title"><span>🎸</span> Genres</div>
        </div>
        <div class="cards-scroll">
          <div class="genre-card" style="background:linear-gradient(135deg,#7c4dff,#e040fb)" onclick="searchGenre('rap')"><div class="genre-card-emoji">🎤</div><div class="genre-card-name">Rap</div></div>
          <div class="genre-card" style="background:linear-gradient(135deg,#ff6d00,#ff9100)" onclick="searchGenre('pop')"><div class="genre-card-emoji">🌟</div><div class="genre-card-name">Pop</div></div>
          <div class="genre-card" style="background:linear-gradient(135deg,#00bcd4,#0097a7)" onclick="searchGenre('rnb')"><div class="genre-card-emoji">🎵</div><div class="genre-card-name">R&B</div></div>
          <div class="genre-card" style="background:linear-gradient(135deg,#e91e63,#c2185b)" onclick="searchGenre('rock')"><div class="genre-card-emoji">🎸</div><div class="genre-card-name">Rock</div></div>
          <div class="genre-card" style="background:linear-gradient(135deg,#4caf50,#388e3c)" onclick="searchGenre('electro')"><div class="genre-card-emoji">🎧</div><div class="genre-card-name">Électro</div></div>
          <div class="genre-card" style="background:linear-gradient(135deg,#ff5722,#e64a19)" onclick="searchGenre('afro')"><div class="genre-card-emoji">🥁</div><div class="genre-card-name">Afro</div></div>
        </div>

        <div class="section" style="margin-top:24px">
          <div class="section-title"><span>🔥</span> Tendances</div>
        </div>
        <div class="trend-scroll" id="trending-list"></div>

        <div class="section" style="margin-top:24px">
          <div class="section-title"><span>⚡</span> Découverte</div>
        </div>
        <div class="section" id="discover-list" style="padding-top:0"></div>
      </div>
    </div>

    <!-- PAGE LIKED -->
    <div id="page-liked" class="page">
      <div class="topbar">
        <div class="topbar-logo">❤️ Mes titres</div>
      </div>
      <div id="liked-list">
        <div class="empty-state"><div class="big-emoji">🎵</div><p>Aucun titre liké pour l'instant.<br>Appuie sur ❤️ pour sauvegarder.</p></div>
      </div>
    </div>

    <!-- PAGE PLAYLIST -->
    <div id="page-playlist" class="page">
      <div class="topbar">
        <div class="topbar-logo">📋 Playlists</div>
      </div>
      <div style="padding:0 20px">
        <div class="empty-state"><div class="big-emoji">🎼</div><p>Crée ta première playlist<br>en likant des musiques !</p></div>
      </div>
    </div>

  </div>

  <!-- NAV -->
  <nav id="nav">
    <button class="ni on" id="ni-home" onclick="showPage('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" fill="none"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      <span>Accueil</span>
    </button>
    <button class="ni" id="ni-liked" onclick="showPage('liked')">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      <span>Likés</span>
    </button>
    <button class="ni" id="ni-playlist" onclick="showPage('playlist')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/><line x1="8" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2"/><line x1="8" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2"/><line x1="3" y1="6" x2="3.01" y2="6" stroke="currentColor" stroke-width="2"/><line x1="3" y1="12" x2="3.01" y2="12" stroke="currentColor" stroke-width="2"/><line x1="3" y1="18" x2="3.01" y2="18" stroke="currentColor" stroke-width="2"/></svg>
      <span>Playlists</span>
    </button>
  </nav>
</div>

<!-- PLAYER BAR -->
<div id="player-bar">
  <div class="player-mini" id="player-mini" onclick="openPlayer()">
    <div class="player-mini-art-ph" id="mini-art">🎵</div>
    <div class="player-mini-info">
      <div class="player-mini-title" id="mini-title">Aucune musique</div>
      <div class="player-mini-artist" id="mini-artist">—</div>
    </div>
    <div class="player-mini-ctrl">
      <button class="pmb" onclick="event.stopPropagation();prevSong()"><svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="white" stroke-width="2"/></svg></button>
      <button class="pmb play-btn" id="mini-play" onclick="event.stopPropagation();togglePlay()"><svg id="mini-play-ico" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <button class="pmb" onclick="event.stopPropagation();nextSong()"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="white" stroke-width="2"/></svg></button>
    </div>
  </div>
</div>

<!-- PLAYER FULL -->
<div id="player-full">
  <div class="pf-bg"></div>
  <div class="pf-content">
    <div class="pf-top">
      <button class="pf-close" onclick="closePlayer()"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
      <div class="pf-title-top">En écoute</div>
      <button class="pf-more"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
    </div>
    <div class="pf-art-wrap">
      <div class="pf-art-ph" id="pf-art">🎵</div>
    </div>
    <div class="pf-info">
      <div class="pf-info-row">
        <div>
          <div class="pf-song-title" id="pf-title">—</div>
          <div class="pf-song-artist" id="pf-artist">—</div>
        </div>
        <button class="pf-like" id="pf-like-btn" onclick="toggleLike()">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
    </div>
    <div class="pf-progress">
      <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-times">
        <span id="time-cur">0:00</span>
        <span id="time-tot">0:00</span>
      </div>
    </div>
    <div class="pf-controls">
      <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()"><svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3" stroke="currentColor" stroke-width="2" fill="none"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21" stroke="currentColor" stroke-width="2" fill="none"/><line x1="4" y1="4" x2="9" y2="9" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
      <button class="ctrl-btn" onclick="prevSong()"><svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button>
      <button class="play-big" id="play-big" onclick="togglePlay()"><svg id="play-big-ico" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <button class="ctrl-btn" onclick="nextSong()"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg></button>
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14" stroke="currentColor" stroke-width="2" fill="none"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
    </div>
    <div class="pf-volume">
      <button class="vol-btn"><svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"/></svg></button>
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80" oninput="setVol(this.value)">
      <button class="vol-btn"><svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let audio=new Audio();
let queue=[];
let queueIdx=0;
let isPlaying=false;
let isShuffle=false;
let isRepeat=false;
let liked=JSON.parse(localStorage.getItem('ys_liked')||'[]');
let currentSong=null;
let searchTimeout=null;
const ENGINES=['gaama','seevn','hunjama','mtmusic','wunk'];
const API='https://musicapi.x007.workers.dev';

// ══════════════════════════════════════
// PAGES
// ══════════════════════════════════════
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  document.getElementById('ni-'+p).classList.add('on');
  if(p==='liked')renderLiked();
}

// ══════════════════════════════════════
// SEARCH
// ══════════════════════════════════════
const inp=document.getElementById('search-inp');
const clearBtn=document.getElementById('search-clear');

inp.addEventListener('input',()=>{
  const q=inp.value.trim();
  clearBtn.classList.toggle('show',q.length>0);
  clearTimeout(searchTimeout);
  if(!q){showHome();return;}
  searchTimeout=setTimeout(()=>doSearch(q),500);
});

clearBtn.addEventListener('click',()=>{
  inp.value='';clearBtn.classList.remove('show');showHome();
});

function showHome(){
  document.getElementById('search-results').style.display='none';
  document.getElementById('home-content').style.display='block';
}

async function doSearch(q){
  document.getElementById('search-results').style.display='block';
  document.getElementById('home-content').style.display='none';
  const list=document.getElementById('results-list');
  list.innerHTML=`<div class="loader"><span></span><span></span><span></span></div>`;
  try{
    const engine=ENGINES[Math.floor(Math.random()*ENGINES.length)];
    const res=await fetch(`${API}/search?q=${encodeURIComponent(q)}&searchEngine=${engine}`);
    const data=await res.json();
    if(!data.response||!data.response.length){
      list.innerHTML=`<div class="empty-state"><div class="big-emoji">😕</div><p>Aucun résultat pour "${q}"</p></div>`;
      return;
    }
    queue=data.response;
    list.innerHTML='';
    data.response.forEach((s,i)=>{
      list.appendChild(makeSongRow(s,i,data.response));
    });
  }catch(e){
    list.innerHTML=`<div class="empty-state"><div class="big-emoji">⚠️</div><p>Erreur de connexion.<br>Vérifie ta connexion internet.</p></div>`;
  }
}

async function searchGenre(genre){
  inp.value=genre;
  clearBtn.classList.add('show');
  await doSearch(genre);
}

function makeSongRow(s,idx,arr){
  const row=document.createElement('div');
  row.className='song-row'+(currentSong&&currentSong.id===s.id?' playing':'');
  row.id='row-'+s.id;
  const isLiked=liked.some(l=>l.id===s.id);
  row.innerHTML=`
    ${s.thumbnail?`<img class="song-thumb" src="${s.thumbnail}" alt="" onerror="this.style.display='none'">`:`<div class="song-thumb-placeholder">🎵</div>`}
    <div class="song-info">
      <div class="song-title">${esc(s.title||'Titre inconnu')}</div>
      <div class="song-artist">${esc(s.artist||s.album||'Artiste inconnu')}</div>
    </div>
    <div class="playing-anim ${currentSong&&currentSong.id===s.id&&isPlaying?'active':''}" id="anim-${s.id}">
      <span></span><span></span><span></span><span></span>
    </div>
    <span class="song-dur">${fmtDur(s.duration)}</span>
  `;
  row.addEventListener('click',()=>{
    queue=arr;queueIdx=idx;playSong(s);
  });
  return row;
}

// ══════════════════════════════════════
// PLAYER
// ══════════════════════════════════════
async function playSong(s){
  currentSong=s;
  isPlaying=false;
  updateUI();
  toast('⏳ Chargement...');
  try{
    // Chercher l'URL audio
    const engine=ENGINES[Math.floor(Math.random()*ENGINES.length)];
    const res=await fetch(`${API}/fetch?id=${s.id}`);
    const data=await res.json();
    if(!data.response||!data.response.audio){
      // Essayer avec une recherche directe
      const res2=await fetch(`${API}/search?q=${encodeURIComponent((s.title||'')+' '+(s.artist||''))}&searchEngine=${engine}`);
      const data2=await res2.json();
      if(data2.response&&data2.response[0]){
        const res3=await fetch(`${API}/fetch?id=${data2.response[0].id}`);
        const data3=await res3.json();
        if(data3.response&&data3.response.audio){
          audio.src=data3.response.audio;
        }else{toast('❌ Musique non disponible');return;}
      }else{toast('❌ Musique non disponible');return;}
    }else{
      audio.src=data.response.audio;
    }
    audio.volume=document.getElementById('vol-slider').value/100;
    await audio.play();
    isPlaying=true;
    toast('▶️ '+esc(s.title||''));
    updateUI();
    updatePlayerUI();
  }catch(e){
    toast('❌ Impossible de lire cette musique');
  }
}

audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  const pct=(audio.currentTime/audio.duration)*100;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('time-cur').textContent=fmtTime(audio.currentTime);
  document.getElementById('time-tot').textContent=fmtTime(audio.duration);
});

audio.addEventListener('ended',()=>{
  if(isRepeat){audio.currentTime=0;audio.play();return;}
  nextSong();
});

function togglePlay(){
  if(!currentSong)return;
  if(isPlaying){audio.pause();isPlaying=false;}
  else{audio.play();isPlaying=true;}
  updateUI();
}

function nextSong(){
  if(!queue.length)return;
  if(isShuffle){queueIdx=Math.floor(Math.random()*queue.length);}
  else{queueIdx=(queueIdx+1)%queue.length;}
  playSong(queue[queueIdx]);
}

function prevSong(){
  if(!queue.length)return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  queueIdx=(queueIdx-1+queue.length)%queue.length;
  playSong(queue[queueIdx]);
}

function seekTo(e){
  if(!audio.duration)return;
  const bar=document.getElementById('progress-bar');
  const rect=bar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  audio.currentTime=pct*audio.duration;
}

function setVol(v){audio.volume=v/100;}

function toggleShuffle(){
  isShuffle=!isShuffle;
  document.getElementById('shuffle-btn').classList.toggle('active',isShuffle);
}

function toggleRepeat(){
  isRepeat=!isRepeat;
  document.getElementById('repeat-btn').classList.toggle('active',isRepeat);
}

function openPlayer(){document.getElementById('player-full').classList.add('open');}
function closePlayer(){document.getElementById('player-full').classList.remove('open');}

function updateUI(){
  // mini bar
  const bar=document.getElementById('player-bar');
  const mini=document.getElementById('player-mini');
  if(currentSong){
    bar.classList.add('active');
    mini.classList.add('show');
    document.getElementById('mini-title').textContent=currentSong.title||'—';
    document.getElementById('mini-artist').textContent=currentSong.artist||'—';
    const miniArt=document.getElementById('mini-art');
    if(currentSong.thumbnail){
      miniArt.outerHTML=`<img class="player-mini-art" id="mini-art" src="${currentSong.thumbnail}" alt="" onerror="this.outerHTML='<div class=\\'player-mini-art-ph\\' id=\\'mini-art\\'>🎵</div>'">`;
    }
  }
  // play icons
  const pauseIcon=`<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;
  const playIcon=`<polygon points="5 3 19 12 5 21 5 3"/>`;
  document.getElementById('mini-play-ico').innerHTML=isPlaying?pauseIcon:playIcon;
  document.getElementById('play-big-ico').innerHTML=isPlaying?pauseIcon:playIcon;
  // rows
  document.querySelectorAll('.song-row').forEach(row=>{
    const rid=row.id.replace('row-','');
    const isThis=currentSong&&currentSong.id==rid;
    row.classList.toggle('playing',isThis);
    const anim=document.getElementById('anim-'+rid);
    if(anim)anim.classList.toggle('active',isThis&&isPlaying);
  });
}

function updatePlayerUI(){
  if(!currentSong)return;
  document.getElementById('pf-title').textContent=currentSong.title||'—';
  document.getElementById('pf-artist').textContent=currentSong.artist||'Artiste inconnu';
  const pfArt=document.getElementById('pf-art');
  if(currentSong.thumbnail){
    pfArt.outerHTML=`<img class="pf-art ${isPlaying?'playing':''}" id="pf-art" src="${currentSong.thumbnail}" alt="">`;
  }
  // like btn
  const isLiked=liked.some(l=>l.id===currentSong.id);
  document.getElementById('pf-like-btn').classList.toggle('liked',isLiked);
}

// ══════════════════════════════════════
// LIKE
// ══════════════════════════════════════
function toggleLike(){
  if(!currentSong)return;
  const idx=liked.findIndex(l=>l.id===currentSong.id);
  if(idx>=0){liked.splice(idx,1);toast('💔 Retiré des likés');}
  else{liked.unshift(currentSong);toast('❤️ Ajouté aux likés');}
  localStorage.setItem('ys_liked',JSON.stringify(liked));
  document.getElementById('pf-like-btn').classList.toggle('liked',idx<0);
}

function renderLiked(){
  const list=document.getElementById('liked-list');
  if(!liked.length){
    list.innerHTML=`<div class="empty-state"><div class="big-emoji">🎵</div><p>Aucun titre liké pour l'instant.<br>Appuie sur ❤️ pour sauvegarder.</p></div>`;
    return;
  }
  list.innerHTML='';
  liked.forEach((s,i)=>{
    list.appendChild(makeSongRow(s,i,liked));
  });
}

// ══════════════════════════════════════
// TRENDING
// ══════════════════════════════════════
const TRENDING_QUERIES=['Drake','Rema','Jul','Booba','The Weeknd','Burna Boy','Ninho','Damso','Bad Bunny','Wizkid'];

async function loadTrending(){
  const q=TRENDING_QUERIES[Math.floor(Math.random()*TRENDING_QUERIES.length)];
  try{
    const engine=ENGINES[Math.floor(Math.random()*ENGINES.length)];
    const res=await fetch(`${API}/search?q=${encodeURIComponent(q)}&searchEngine=${engine}`);
    const data=await res.json();
    if(!data.response)return;
    const list=document.getElementById('trending-list');
    list.innerHTML='';
    data.response.slice(0,8).forEach((s,i)=>{
      const card=document.createElement('div');
      card.className='trend-card';
      card.innerHTML=`
        ${s.thumbnail?`<img class="trend-art" src="${s.thumbnail}" alt="" onerror="this.style.display='none'">`:`<div class="trend-art-ph">🎵</div>`}
        <div class="trend-name">${esc(s.title||'')}</div>
        <div class="trend-artist">${esc(s.artist||'')}</div>
      `;
      card.addEventListener('click',()=>{queue=data.response;queueIdx=i;playSong(s);});
      list.appendChild(card);
    });
    // Discover
    loadDiscover();
  }catch(e){}
}

async function loadDiscover(){
  const queries=['hits 2024','nouveautés','top musique','afrobeats 2024'];
  const q=queries[Math.floor(Math.random()*queries.length)];
  try{
    const engine=ENGINES[Math.floor(Math.random()*ENGINES.length)];
    const res=await fetch(`${API}/search?q=${encodeURIComponent(q)}&searchEngine=${engine}`);
    const data=await res.json();
    if(!data.response)return;
    const list=document.getElementById('discover-list');
    list.innerHTML='';
    const songs=data.response.slice(0,6);
    songs.forEach((s,i)=>{
      list.appendChild(makeSongRow(s,i,songs));
    });
  }catch(e){}
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtTime(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function fmtDur(d){if(!d)return'';if(typeof d==='string'&&d.includes(':'))return d;return fmtTime(parseInt(d));}
let toastTmr=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');if(toastTmr)clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.classList.remove('on'),3000);}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
loadTrending();
</script>
</body>
</html>
